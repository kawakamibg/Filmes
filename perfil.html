<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Minha Lista de Filmes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="https://a.ltrbxd.com/logos/letterboxd-decal-dots-pos-rgb.svg">
</head>
<body>
    <header>
        <h1>⚙️ Configurações da Conta</h1>
        <p>Gerencie seus dados de acesso</p>
        <div style="position: absolute; top: 20px; right: 20px;">
            <a href="index.html" class="profile-btn"><i class="fas fa-arrow-left"></i> Voltar à Lista</a>
        </div>
    </header>

    <main>
        <section id="add-movie" style="max-width: 600px; margin: 0 auto;">
            <h2>Mudar Nome de Usuário</h2>
            <form id="form-username">
                <p style="color: var(--text-secondary); margin-bottom: 15px;">
                    Usuário atual: <strong id="display-current-username" style="color: var(--accent-color); font-size: 1.2em;"></strong>
                </p>
                <input type="text" id="new-username" placeholder="Digite o novo nome de usuário" required>
                <button type="submit">Atualizar Nome</button>
            </form>

            <hr style="margin: 40px 0; border-color: #333;">

            <h2>Mudar Senha</h2>
            <form id="form-password">
                <input type="password" id="current-password" placeholder="Sua senha atual" required>
                <input type="password" id="new-password" placeholder="Nova senha" required>
                <button type="submit">Atualizar Senha</button>
            </form>
        </section>
    </main>

    <script>
        // --- 1. Verifica se está logado e carrega os dados ---
        const currentUser = localStorage.getItem('letterboxd_user');
        if (!currentUser) {
            window.location.href = 'login.html'; // Expulsa se não estiver logado
        }

        document.getElementById('display-current-username').textContent = currentUser;

        // --- 2. Função para Mudar o Nome de Usuário ---
        document.getElementById('form-username').addEventListener('submit', function(e) {
            e.preventDefault();
            const newUsername = document.getElementById('new-username').value.trim();

            if (newUsername === currentUser) {
                alert('Esse já é o seu nome atual!');
                return;
            }

            let users = JSON.parse(localStorage.getItem('letterboxd_users_db')) || [];
            
            // Verifica se o novo nome já está sendo usado por outra pessoa
            if (users.some(u => u.username === newUsername)) {
                alert('Esse nome de usuário já está em uso por outra pessoa. Escolha outro!');
                return;
            }

            // Encontra o usuário atual e atualiza o nome dele
            const userIndex = users.findIndex(u => u.username === currentUser);
            if (userIndex > -1) {
                users[userIndex].username = newUsername;
                localStorage.setItem('letterboxd_users_db', JSON.stringify(users)); // Salva no DB
                localStorage.setItem('letterboxd_user', newUsername); // Atualiza a sessão atual
                
                alert('Nome de usuário atualizado com sucesso!');
                window.location.reload(); // Recarrega a página para mostrar o novo nome
            }
        });

        // --- 3. Função para Mudar a Senha ---
        document.getElementById('form-password').addEventListener('submit', function(e) {
            e.preventDefault();
            const currentPasswordInput = document.getElementById('current-password').value;
            const newPasswordInput = document.getElementById('new-password').value;

            let users = JSON.parse(localStorage.getItem('letterboxd_users_db')) || [];
            const userIndex = users.findIndex(u => u.username === currentUser);

            if (userIndex > -1) {
                // Verifica se a senha atual digitada está correta
                if (users[userIndex].password !== currentPasswordInput) {
                    alert('A senha atual está incorreta!');
                    return;
                }

                // Atualiza a senha
                users[userIndex].password = newPasswordInput;
                localStorage.setItem('letterboxd_users_db', JSON.stringify(users));
                
                alert('Senha atualizada com sucesso!');
                document.getElementById('form-password').reset(); // Limpa os campos
            }
        });
    </script>
</body>
</html>
